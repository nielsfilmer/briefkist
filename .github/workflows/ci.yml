# CI (closes #10): mechanical merge gate — ruff + pytest on ubuntu, and a
# Docker build proving the Linux distribution path (pushed to GHCR on main).
# Flutter app checks live in github.com/nielsfilmer/briefkist-app since the
# app/ subtree split (plan.md decision #19).
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  python:
    name: ruff + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # No darwin/paddle extras here: Apple Vision deps are sys_platform-gated
      # in pyproject.toml and the suite must stay green without either OCR
      # engine installed (engines are imported lazily).
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run pytest -q

  docker:
    name: docker build (+ push on main)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/nielsfilmer/briefkist
      # Push only from main — PR builds just prove the Dockerfile.
      PUSH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: env.PUSH == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ env.PUSH == 'true' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          # The build downloads the PaddleOCR models (see Dockerfile) — cache
          # layers across runs so that only re-runs when deps/source change.
          cache-from: type=gha
          cache-to: type=gha,mode=max
