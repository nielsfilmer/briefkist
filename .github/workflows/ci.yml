# CI (closes #10): mechanical merge gate — ruff + pytest on ubuntu, Flutter
# checks when app/ changes, and a Docker build proving the Linux distribution
# path (pushed to GHCR on main).
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  # dorny/paths-filter reads the PR's changed files via the API
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  python:
    name: ruff + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # No darwin/paddle extras here: Apple Vision deps are sys_platform-gated
      # in pyproject.toml and the suite must stay green without either OCR
      # engine installed (engines are imported lazily).
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run pytest -q

  changes:
    name: detect changed paths
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'app/**'

  flutter:
    name: flutter analyze + test
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.x
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  docker:
    name: docker build (+ push on main)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/nielsfilmer/briefkist
      # Push only from main — PR builds just prove the Dockerfile.
      PUSH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: env.PUSH == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ env.PUSH == 'true' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          # The build downloads the PaddleOCR models (see Dockerfile) — cache
          # layers across runs so that only re-runs when deps/source change.
          cache-from: type=gha
          cache-to: type=gha,mode=max
