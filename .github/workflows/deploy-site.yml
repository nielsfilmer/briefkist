# Deploy the marketing site (briefkist.eu) to the web host on push to main.
#
# Why this exists: merging a website change updates dist/ in git but does NOT
# touch the running site — the deploy was manual and undocumented, so PR #58's
# /investors page 404'd in production after merge. This closes that gap: any
# push to main that touches website/** rebuilds the static site and rsyncs it
# to the host. Also runnable on demand via the "Run workflow" button
# (workflow_dispatch) — use that to deploy the current dist without a new push.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_SSH_KEY      private key of a DEDICATED deploy keypair (not a
#                       personal key); its public half is in the host user's
#                       ~/.ssh/authorized_keys (ideally command-restricted).
#   DEPLOY_HOST         host to ssh to, e.g. briefkist.eu or 78.47.167.21
#   DEPLOY_USER         ssh user, e.g. deploy
#   DEPLOY_PATH         absolute webroot Caddy serves, e.g. /var/www/briefkist
#   DEPLOY_KNOWN_HOSTS  the host's SSH host-key line(s), from
#                       `ssh-keyscan -t ed25519,rsa <host>` — pins the host key
#                       so the deploy can't be MITM'd.
# Optional:
#   DEPLOY_SITE_URL     URL the post-deploy liveness probe hits; defaults to
#                       https://<DEPLOY_HOST>/. Set this when DEPLOY_HOST is a
#                       bare IP (a plain https://<ip>/ probe fails TLS cert
#                       validation and would false-red an otherwise good deploy).
# Until DEPLOY_HOST is set the job SKIPS (stays green) instead of failing red.
#
# This repo is PUBLIC: nothing sensitive is hardcoded here — host, user, path,
# and keys all come from secrets. The private key never leaves the runner.
name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read

# Serialize deploys; never cancel one mid-rsync (a half-synced webroot is worse
# than a queued deploy).
concurrency:
  group: deploy-site
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Skip gracefully (green) when the deploy secrets aren't configured yet,
      # rather than failing main red. Only DEPLOY_HOST is probed as the sentinel.
      - name: Check deploy is configured
        id: cfg
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          if [ -z "$DEPLOY_HOST" ]; then
            echo "::warning::Deploy secrets not configured (DEPLOY_HOST empty) — skipping deploy."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      # build.py is stdlib-only and resolves its own dirs via __file__, so a
      # bare python3 rebuild is cwd-independent and needs no extra deps. We
      # deploy the freshly-built dist/ (not the committed one) so a stale commit
      # can never reach production.
      - name: Build site
        if: steps.cfg.outputs.configured == 'true'
        run: python3 website/build.py

      - name: Install SSH key and known_hosts
        if: steps.cfg.outputs.configured == 'true'
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # rsync the built site to the webroot. Trailing slash on the source syncs
      # the CONTENTS of dist/ into DEPLOY_PATH. --delete makes the webroot an
      # exact mirror of dist/, pruning renamed/removed pages — required since
      # the pretty-URL move (foo.html -> foo/index.html) orphans the old flat
      # files, which otherwise linger and serve duplicate content. Verified
      # safe: DEPLOY_PATH (/srv/briefkist-www) is dedicated to this static site
      # — a dry-run --delete removed only the 8 relocated .html files, no assets
      # or non-site content. If the webroot ever gains non-site files, this
      # flag would delete them — keep the webroot site-only.
      - name: Deploy via rsync
        if: steps.cfg.outputs.configured == 'true'
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -rlptzv --delete --stats \
            -e "ssh -i $HOME/.ssh/deploy_key -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o StrictHostKeyChecking=yes" \
            website/dist/ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

      # Liveness probe: the site is static so Caddy serves the new files with no
      # reload. Accept any real HTTP response (200, or 401 if basic-auth gated,
      # or a redirect) — a connection failure or 5xx fails the job.
      - name: Verify site responds
        if: steps.cfg.outputs.configured == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SITE_URL: ${{ secrets.DEPLOY_SITE_URL }}
        run: |
          # Probe DEPLOY_SITE_URL if set, else https://<host>/. The override
          # matters when DEPLOY_HOST is a bare IP: https://<ip>/ fails TLS cert
          # validation and would false-red a good deploy.
          url="${DEPLOY_SITE_URL:-https://${DEPLOY_HOST}/}"
          code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 20 "$url" || echo 000)
          echo "GET $url -> $code"
          case "$code" in
            2*|3*|401) echo "site is responding";;
            *) echo "::error::site did not respond healthily (HTTP $code)"; exit 1;;
          esac
