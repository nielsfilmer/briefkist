name: my_flopy
description: "my-flopy — private, local-first snail-mail archive (iOS + macOS client)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  cunning_document_scanner: ^2.5.0
  desktop_drop: ^0.7.1
  file_selector: ^1.1.0
  flutter:
    sdk: flutter
  http: ^1.6.0
  image_picker: ^1.2.3
  mobile_scanner: ^7.2.0
  path_drawing: ^1.0.1
  qr_flutter: ^4.1.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Design-system fonts (design/readme.md "Type"), bundled per plan.md
  # decision v0.5 #16 — never fetched from a CDN. OFL licences alongside
  # the files in assets/fonts/.
  fonts:
    - family: Lora
      fonts:
        - asset: assets/fonts/Lora-Regular.ttf
          weight: 400
        - asset: assets/fonts/Lora-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/Lora-Medium.ttf
          weight: 500
        - asset: assets/fonts/Lora-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Lora-Bold.ttf
          weight: 700
    - family: Source Sans 3
      fonts:
        - asset: assets/fonts/SourceSans3-Regular.ttf
          weight: 400
        - asset: assets/fonts/SourceSans3-It.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/SourceSans3-Medium.ttf
          weight: 500
        - asset: assets/fonts/SourceSans3-Semibold.ttf
          weight: 600
        - asset: assets/fonts/SourceSans3-Bold.ttf
          weight: 700
    - family: Source Code Pro
      fonts:
        - asset: assets/fonts/SourceCodePro-Regular.ttf
          weight: 400
        - asset: assets/fonts/SourceCodePro-Medium.ttf
          weight: 500
        - asset: assets/fonts/SourceCodePro-Semibold.ttf
          weight: 600
