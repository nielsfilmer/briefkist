<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:sticky;top:0;z-index:60;background:var(--surface-page);border-bottom:1px solid var(--border)">
  <div style="max-width:1120px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;gap:20px">
    <a href="Landing.dc.html" style="display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--text-1);flex:none" style-focus="outline:2px solid var(--focus-ring);outline-offset:2px;border-radius:4px" aria-label="Briefkist home">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h12.5L20 7.5V20H4Z"></path><path d="M8 4v2.6l4 3 4-3V4"></path><path d="M8 20v-5.5h8V20"></path></svg>
      <span style="font-family:var(--font-serif);font-size:19px;font-weight:600;letter-spacing:-0.01em">briefkist</span>
    </a>
    <sc-if value="{{isDesktop}}" hint-placeholder-val="{{ true }}">
      <nav style="display:flex;gap:2px;flex:1" aria-label="Site">
        <sc-for list="{{links}}" as="l" hint-placeholder-count="4">
          <a href="{{l.href}}" style="padding:7px 12px;border-radius:var(--radius-md);text-decoration:none;font-family:var(--font-sans);font-size:var(--text-base);color:{{l.color}};font-weight:{{l.weight}};background:{{l.bg}}" style-hover="background:var(--surface-hover);color:var(--text-1)" style-focus="outline:2px solid var(--focus-ring);outline-offset:2px">{{l.label}}</a>
        </sc-for>
      </nav>
      <div style="display:flex;align-items:center;gap:8px;flex:none">
        <a href="https://github.com/nielsfilmer/briefkist" style="display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:var(--radius-md);color:var(--text-2)" style-hover="background:var(--surface-hover);color:var(--text-1)" style-focus="outline:2px solid var(--focus-ring);outline-offset:2px" aria-label="Source on GitHub" title="Source on GitHub">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path><path d="M9 18c-4.51 2-5-2-7-2"></path></svg>
        </a>
        <button onClick="{{toggleTheme}}" style="display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:var(--radius-md);border:none;background:transparent;color:var(--text-2);cursor:pointer" style-hover="background:var(--surface-hover);color:var(--text-1)" style-focus="outline:2px solid var(--focus-ring);outline-offset:2px" aria-label="Toggle dark mode">
          <sc-if value="{{isLightTheme}}" hint-placeholder-val="{{ true }}"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg></sc-if>
          <sc-if value="{{isDarkTheme}}" hint-placeholder-val="{{ false }}"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg></sc-if>
        </button>
        <a href="Account.dc.html" style="padding:7px 12px;border-radius:var(--radius-md);text-decoration:none;font-family:var(--font-sans);font-size:var(--text-base);color:var(--text-2)" style-hover="background:var(--surface-hover);color:var(--text-1)" style-focus="outline:2px solid var(--focus-ring);outline-offset:2px">Sign in</a>
        <a href="Signup.dc.html" style="display:inline-flex;align-items:center;height:36px;padding:0 14px;border-radius:var(--radius-md);text-decoration:none;font-family:var(--font-sans);font-size:var(--text-base);font-weight:var(--weight-semibold);background:var(--accent);color:var(--text-on-accent);white-space:nowrap" style-hover="background:var(--accent-hover)" style-focus="outline:2px solid var(--focus-ring);outline-offset:2px">Get started</a>
      </div>
    </sc-if>
    <sc-if value="{{isMobile}}" hint-placeholder-val="{{ false }}">
      <div style="flex:1"></div>
      <button onClick="{{toggleTheme}}" style="display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:var(--radius-md);border:none;background:transparent;color:var(--text-2);cursor:pointer" style-focus="outline:2px solid var(--focus-ring);outline-offset:2px" aria-label="Toggle dark mode">
        <sc-if value="{{isLightTheme}}" hint-placeholder-val="{{ true }}"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg></sc-if>
        <sc-if value="{{isDarkTheme}}" hint-placeholder-val="{{ false }}"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg></sc-if>
      </button>
      <button onClick="{{openMenu}}" style="display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:var(--radius-md);border:none;background:transparent;color:var(--text-1);cursor:pointer" style-focus="outline:2px solid var(--focus-ring);outline-offset:2px" aria-label="Open menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16"></path><path d="M4 12h16"></path><path d="M4 18h16"></path></svg>
      </button>
    </sc-if>
  </div>
</div>
<sc-if value="{{drawerOpen}}" hint-placeholder-val="{{ false }}">
  <div style="position:fixed;inset:0;z-index:100;background:var(--surface-page);display:flex;flex-direction:column">
    <div style="height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid var(--border)">
      <span style="display:flex;align-items:center;gap:9px;color:var(--text-1)">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h12.5L20 7.5V20H4Z"></path><path d="M8 4v2.6l4 3 4-3V4"></path><path d="M8 20v-5.5h8V20"></path></svg>
        <span style="font-family:var(--font-serif);font-size:19px;font-weight:600">briefkist</span>
      </span>
      <button onClick="{{closeMenu}}" style="display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:var(--radius-md);border:none;background:transparent;color:var(--text-1);cursor:pointer" style-focus="outline:2px solid var(--focus-ring);outline-offset:2px" aria-label="Close menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
      </button>
    </div>
    <nav style="display:flex;flex-direction:column;padding:16px 24px;gap:2px" aria-label="Site">
      <sc-for list="{{links}}" as="l" hint-placeholder-count="4">
        <a href="{{l.href}}" style="padding:14px 12px;border-radius:var(--radius-md);text-decoration:none;font-family:var(--font-sans);font-size:var(--text-md);color:{{l.color}};font-weight:{{l.weight}};background:{{l.bg}}" style-hover="background:var(--surface-hover)">{{l.label}}</a>
      </sc-for>
      <a href="Account.dc.html" style="padding:14px 12px;border-radius:var(--radius-md);text-decoration:none;font-family:var(--font-sans);font-size:var(--text-md);color:var(--text-2)" style-hover="background:var(--surface-hover)">Sign in</a>
    </nav>
    <div style="padding:16px 36px;display:flex;flex-direction:column;gap:12px">
      <a href="Signup.dc.html" style="display:inline-flex;align-items:center;justify-content:center;height:48px;border-radius:var(--radius-md);text-decoration:none;font-family:var(--font-sans);font-size:var(--text-md);font-weight:var(--weight-semibold);background:var(--accent);color:var(--text-on-accent)" style-hover="background:var(--accent-hover)">Get started</a>
      <a href="https://github.com/nielsfilmer/briefkist" style="display:inline-flex;align-items:center;justify-content:center;height:48px;border-radius:var(--radius-md);text-decoration:none;font-family:var(--font-sans);font-size:var(--text-md);font-weight:var(--weight-semibold);background:var(--surface-card);color:var(--text-1);border:1px solid var(--border-strong)" style-hover="background:var(--surface-hover)">Source on GitHub</a>
    </div>
    <div style="margin-top:auto;padding:24px;font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-3)">free to self-host · AGPL-3.0</div>
  </div>
</sc-if>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:64},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;pricing&quot;,&quot;security&quot;,&quot;docs&quot;,&quot;&quot;],&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { theme: "light", open: false, mobile: false };

  componentDidMount() {
    let theme = "light";
    try { theme = localStorage.getItem("bk-theme") === "dark" ? "dark" : "light"; } catch (e) {}
    this.applyTheme(theme);
    this.mq = window.matchMedia("(max-width: 820px)");
    this.onMq = () => this.setState({ mobile: this.mq.matches, open: false });
    this.mq.addEventListener("change", this.onMq);
    this.setState({ theme: theme, mobile: this.mq.matches });
  }

  componentWillUnmount() {
    if (this.mq) this.mq.removeEventListener("change", this.onMq);
  }

  applyTheme(theme) {
    if (theme === "dark") document.documentElement.setAttribute("data-theme", "dark");
    else document.documentElement.removeAttribute("data-theme");
  }

  renderVals() {
    const active = this.props.active ?? "";
    const links = [
      { label: "Product", href: "Landing.dc.html", key: "home" },
      { label: "Pricing", href: "Pricing.dc.html", key: "pricing" },
      { label: "Security", href: "Security.dc.html", key: "security" },
      { label: "Docs", href: "Docs.dc.html", key: "docs" }
    ].map((l) => ({
      label: l.label,
      href: l.href,
      color: l.key === active ? "var(--text-1)" : "var(--text-2)",
      weight: l.key === active ? 600 : 400,
      bg: l.key === active ? "var(--surface-hover)" : "transparent"
    }));
    return {
      links: links,
      isDesktop: !this.state.mobile,
      isMobile: this.state.mobile,
      drawerOpen: this.state.open && this.state.mobile,
      isLightTheme: this.state.theme !== "dark",
      isDarkTheme: this.state.theme === "dark",
      toggleTheme: () => {
        const t = this.state.theme === "dark" ? "light" : "dark";
        try { localStorage.setItem("bk-theme", t); } catch (e) {}
        this.applyTheme(t);
        this.setState({ theme: t });
      },
      openMenu: () => this.setState({ open: true }),
      closeMenu: () => this.setState({ open: false })
    };
  }
}
</script>
</body>
</html>
